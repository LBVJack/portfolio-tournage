<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Nom - Photographe de Plateau</title>
    
    <!-- Cette ligne relie notre squelette à notre futur design -->
    <link rel="stylesheet" href="style.css">
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body>

    <!-- L'en-tête de ton site avec la navigation -->
    <header>
        <h1>Mon Nom</h1>
        <p>Photographie de Tournage & Coulisses</p>
        <nav>
            <a href="#">Galeries</a>
            <a href="#">À Propos</a>
            <a href="#">Contact</a>
        </nav>
    </header>

    <!-- Le contenu principal -->
    <main>
<section class="albums-grid">
    <h2>Derniers Projets</h2>
    <div id="grid" class="grid-container">
        <p>Chargement des projets...</p>
    </div>
</section>

<script>
    async function loadProjects() {
        const grid = document.getElementById('grid');
        // On va chercher la liste des fichiers dans ton dossier projets sur GitHub
        // Remplace 'TON_PSEUDO' par ton pseudo GitHub
        const response = await fetch('https://api.github.com/repos/LBVJack/portfolio-tournage/contents/projets');
        const files = await response.json();
        
        grid.innerHTML = ''; // On vide le message de chargement

        for (let file of files) {
            if (file.name.endsWith('.json')) {
                const res = await fetch(file.download_url);
                const data = await res.json();
                
                // On crée l'élément HTML pour chaque projet
                const item = document.createElement('div');
                item.className = 'grid-item';
                item.innerHTML = `
                    <img src="${data.thumbnail}" alt="${data.title}">
                    <div class="overlay">
                        <h3>${data.title}</h3>
                    </div>
                `;
                grid.appendChild(item);
            }
        }
    }
    loadProjects();
</script>
    </main>

    <!-- Le pied de page -->
    <footer>
        <p>© 2026 - Tous droits réservés.</p>
    </footer>
<script>
  if (window.netlifyIdentity) {
    window.netlifyIdentity.on("init", user => {
      if (!user) {
        window.netlifyIdentity.on("login", () => {
          document.location.href = "/admin/";
        });
      }
    });
  }
</script>
</body>
</html>
